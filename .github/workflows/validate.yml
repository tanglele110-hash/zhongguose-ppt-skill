name: validate

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  skill:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: skills/zhongguose-ppt-skill/requirements.txt

      - name: Install font dependencies
        run: python -m pip install -r skills/zhongguose-ppt-skill/requirements.txt

      - name: Install browser QA dependency
        run: npm ci --ignore-scripts

      - name: Validate package
        run: node scripts/validate-package.mjs skills/zhongguose-ppt-skill

      - name: Check scripts
        shell: bash
        run: |
          node --check skills/zhongguose-ppt-skill/scripts/extract-deck-outline.mjs
          node --check skills/zhongguose-ppt-skill/scripts/validate-deck.mjs
          node --check skills/zhongguose-ppt-skill/scripts/preview-deck.mjs
          node --check skills/zhongguose-ppt-skill/scripts/browser-qa.mjs
          python -m py_compile skills/zhongguose-ppt-skill/scripts/subset-cover-font.py
          python -m py_compile skills/zhongguose-ppt-skill/scripts/check-cover-glyphs.py

      - name: Build clean test deck
        shell: bash
        run: |
          cp -R skills/zhongguose-ppt-skill/assets/template-zhongguose .ci-deck
          python skills/zhongguose-ppt-skill/scripts/subset-cover-font.py \
            .ci-deck/index.html \
            --include-html skills/zhongguose-ppt-skill/assets/theme-cover-gallery.html

      - name: Validate test deck
        shell: bash
        run: |
          node skills/zhongguose-ppt-skill/scripts/extract-deck-outline.mjs .ci-deck/index.html
          node skills/zhongguose-ppt-skill/scripts/validate-deck.mjs .ci-deck/index.html
          python skills/zhongguose-ppt-skill/scripts/check-cover-glyphs.py \
            .ci-deck/assets/fonts/zhongguose-cover.woff2 \
            --text 飞泉绿 --text 藕丝秋 --text 湘蓝 --text 绛缨 --text 鸦黄 --text 山岚
          node skills/zhongguose-ppt-skill/scripts/browser-qa.mjs .ci-deck/index.html
